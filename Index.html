<!DOCTYPE html>
<html lang="hi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Happy Belated Birthday Sanjana Ma'am 🌸</title>
  <style>
    body {
      margin: 0;
      padding: 20px;
      min-height: 100vh;
      background: linear-gradient(135deg, #fff0f5, #f0e6ff);
      font-family: system-ui, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }
    .card {
      width: 100%;
      max-width: 380px;
      background: white;
      border-radius: 28px;
      box-shadow: 0 20px 60px rgba(200, 150, 200, 0.3);
      overflow: hidden;
      position: relative;
    }
    .top-bar {
      height: 12px;
      background: linear-gradient(90deg, #ff9ed9, #c4a0ff, #9ed9c4, #ffe6b3);
    }
    .content {
      padding: 40px 30px;
      text-align: center;
    }
    .photo {
      width: 140px;
      height: 140px;
      margin: 0 auto 20px;
      border-radius: 50%;
      border: 6px solid #f8d7e8;
      overflow: hidden;
    }
    .photo img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
    h1 {
      font-size: 28px;
      color: #6b2d5c;
      margin: 10px 0;
    }
    .message {
      background: #fff5f8;
      padding: 20px;
      border-radius: 18px;
      margin: 25px 0;
      font-size: 15.5px;
      line-height: 1.8;
      color: #5c3d52;
    }
    .from {
      margin-top: 30px;
      font-size: 14px;
      color: #9c6b85;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="top-bar"></div>
    <div class="content">
      <div class="photo">
        <img src="https://via.placeholder.com/300x300/e8d0ff/6b2d5c?text=Ma%27am" alt="Sanjana Ma'am">
      </div>
      <h1>Happy Belated Birthday</h1>
      <h2 style="color:#c45a85; margin-bottom:20px;">Sanjana Ma'am 🌸</h2>
      
      <div class="message">
        Dear Ma'am,<br><br>
        Aapki guidance aur support ke liye bahut bahut dhanyawad.<br>
        Aap sirf teacher nahi, ek inspiration hain.<br><br>
        Aapka har din khushiyon se bhara ho. 🎉
      </div>

      <div class="from">
        With respect & love<br>
        <strong>Your Student</strong>
      </div>
    </div>
  </div>
</body>
</html>
