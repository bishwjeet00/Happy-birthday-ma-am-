<!DOCTYPE html>
<html lang="hi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Happy Belated Birthday Sanjana Ma'am 🌸</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=DM+Serif+Display:ital@0;1&family=Nunito:wght@300;400;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --pink:    #f2a7c3;
      --peach:   #fcd5b5;
      --lavender:#d9b8f0;
      --mint:    #b5e8d5;
      --cream:   #fffaf5;
      --soft-bg: #fef0f5;
      --text:    #3d2035;
      --muted:   #9c6080;
      --gold:    #e8b86d;
      --deep-pink:#c4558a;
    }

    * { margin:0; padding:0; box-sizing:border-box; }

    body {
      min-height: 100vh;
      background: var(--soft-bg);
      background-image:
        radial-gradient(circle at 15% 15%, rgba(242,167,195,0.3) 0%, transparent 50%),
        radial-gradient(circle at 85% 85%, rgba(217,184,240,0.3) 0%, transparent 50%),
        radial-gradient(circle at 70% 10%, rgba(181,232,213,0.2) 0%, transparent 40%);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 30px 16px;
      font-family: 'Nunito', sans-serif;
    }

    /* Floating sparkles */
    .sparkle {
      position: fixed;
      pointer-events: none;
      animation: twinkle ease-in-out infinite alternate;
      opacity: 0;
      font-size: 14px;
    }
    @keyframes twinkle {
      0%   { opacity: 0;   transform: scale(0.4) rotate(0deg); }
      100% { opacity: 0.8; transform: scale(1.3) rotate(25deg); }
    }
    .s1  { top:5%;  left:4%;  animation-duration:2.2s; animation-delay:0s;   }
    .s2  { top:12%; left:92%; animation-duration:1.7s; animation-delay:0.4s; }
    .s3  { top:38%; left:2%;  animation-duration:2.6s; animation-delay:1.1s; }
    .s4  { top:65%; left:94%; animation-duration:1.8s; animation-delay:0.7s; }
    .s5  { top:82%; left:7%;  animation-duration:2.3s; animation-delay:0.2s; }
    .s6  { top:50%; left:97%; animation-duration:2.0s; animation-delay:1.4s; }
    .s7  { top:28%; left:48%; animation-duration:2.5s; animation-delay:0.6s; }
    .s8  { top:92%; left:52%; animation-duration:1.9s; animation-delay:1.0s; }

    /* Card */
    .card {
      width: 500px;
      max-width: 100%;
      background: var(--cream);
      border-radius: 28px;
      box-shadow:
        0 10px 50px rgba(242,167,195,0.35),
        0 2px 10px rgba(0,0,0,0.07),
        inset 0 1px 0 rgba(255,255,255,0.95);
      overflow: hidden;
      animation: popIn 1s cubic-bezier(0.34,1.56,0.64,1) both;
    }

    @keyframes popIn {
      from { opacity:0; transform: scale(0.82) translateY(40px); }
      to   { opacity:1; transform: scale(1) translateY(0); }
    }

    /* Animated confetti top strip */
    .confetti-strip {
      height: 9px;
      background: repeating-linear-gradient(
        90deg,
        #f2a7c3 0px, #f2a7c3 18px,
        #d9b8f0 18px, #d9b8f0 36px,
        #b5e8d5 36px, #b5e8d5 54px,
        #fcd5b5 54px, #fcd5b5 72px,
        #e8b86d 72px, #e8b86d 90px
      );
      background-size: 180px;
      animation: slideRight 10s linear infinite;
    }
    @keyframes slideRight {
      from { background-position: 0 0; }
      to   { background-position: 180px 0; }
    }

    /* Photo header area */
    .photo-header {
      position: relative;
      background: linear-gradient(160deg, #fde8f2 0%, #f0d8f0 50%, #e0d5f8 100%);
      padding: 36px 20px 28px;
      display: flex;
      flex-direction: column;
      align-items: center;
      overflow: hidden;
    }

    .photo-header::before {
      content: '';
      position: absolute;
      inset: 0;
      background:
        radial-gradient(circle at 20% 50%, rgba(255,255,255,0.35) 0%, transparent 55%),
        radial-gradient(circle at 85% 20%, rgba(217,184,240,0.4) 0%, transparent 50%);
      pointer-events: none;
    }

    /* Decorative blobs */
    .blob {
      position: absolute;
      border-radius: 50%;
      opacity: 0.35;
      pointer-events: none;
    }
    .b1 { width:180px; height:180px; background:rgba(242,167,195,0.6); top:-50px; right:-40px; }
    .b2 { width:110px; height:110px; background:rgba(181,232,213,0.55); bottom:-30px; left:10px; }
    .b3 { width:75px;  height:75px;  background:rgba(232,184,109,0.5);  top:15px;   left:50px; }

    /* Late badge */
    .late-badge {
      position: relative;
      z-index: 4;
      background: white;
      border-radius: 22px;
      padding: 6px 18px;
      font-size: 11px;
      font-weight: 700;
      color: var(--muted);
      letter-spacing: 2px;
      text-transform: uppercase;
      box-shadow: 0 3px 16px rgba(242,167,195,0.5);
      margin-bottom: 20px;
      animation: popIn 0.8s 0.6s both;
    }

    /* Photo circle */
    .photo-ring {
      position: relative;
      z-index: 3;
      width: 148px;
      height: 148px;
      border-radius: 50%;
      padding: 4px;
      background: linear-gradient(135deg, #f2a7c3, #d9b8f0, #b5e8d5, #f2a7c3);
      background-size: 300% 300%;
      animation: gradientSpin 4s ease infinite, floatPhoto 3s ease-in-out infinite alternate;
      box-shadow: 0 6px 30px rgba(242,167,195,0.5);
    }
    @keyframes gradientSpin {
      0%   { background-position: 0% 50%; }
      50%  { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }
    @keyframes floatPhoto {
      from { transform: translateY(0px); }
      to   { transform: translateY(-10px); }
    }

    .photo-inner {
      width: 100%;
      height: 100%;
      border-radius: 50%;
      overflow: hidden;
      border: 3px solid white;
      background: #fde8f0;
    }
    .photo-inner img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    /* Floating sticker emojis */
    .sticker {
      position: absolute;
      font-size: 24px;
      z-index: 5;
      animation: wobble 2.2s ease-in-out infinite alternate;
    }
    @keyframes wobble {
      from { transform: rotate(-8deg) scale(1); }
      to   { transform: rotate(8deg) scale(1.15); }
    }
    .st1 { bottom:12px; right:22px; font-size:28px; animation-delay:0s; }
    .st2 { top:16px;    right:14px; font-size:20px; animation-delay:0.6s; }
    .st3 { bottom:8px;  left:150px; font-size:19px; animation-delay:1.1s; }
    .st4 { top:20px;    left:18px;  font-size:18px; animation-delay:0.3s; }

    /* Card body */
    .card-body {
      padding: 30px 38px 36px;
      text-align: center;
    }

    /* Name + greeting */
    .greeting-block {
      animation: fadeUp 0.8s 0.5s both;
      margin-bottom: 18px;
    }
    .greeting-top {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: var(--pink);
      margin-bottom: 6px;
    }
    h1 {
      font-family: 'DM Serif Display', serif;
      font-size: 44px;
      font-style: italic;
      line-height: 1.1;
      color: var(--text);
    }
    h1 .name {
      display: block;
      font-size: 50px;
      background: linear-gradient(135deg, #e07aaa, #b040a0);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    /* Tags */
    .tags {
      display: flex;
      gap: 8px;
      justify-content: center;
      flex-wrap: wrap;
      margin-bottom: 20px;
      animation: fadeUp 0.8s 0.65s both;
    }
    .tag {
      background: linear-gradient(135deg, rgba(242,167,195,0.18), rgba(217,184,240,0.18));
      border: 1.5px solid rgba(242,167,195,0.4);
      border-radius: 20px;
      padding: 5px 14px;
      font-size: 12px;
      color: var(--muted);
      font-weight: 700;
    }

    /* Divider */
    .divider {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 20px;
      animation: fadeUp 0.8s 0.75s both;
    }
    .divider::before, .divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: linear-gradient(to right, transparent, rgba(242,167,195,0.6), transparent);
    }
    .divider span { font-size: 18px; }

    /* Message */
    .message-box {
      background: linear-gradient(135deg, rgba(252,213,181,0.12), rgba(242,167,195,0.1));
      border-radius: 18px;
      border: 1.5px solid rgba(242,167,195,0.22);
      padding: 22px 24px;
      text-align: left;
      margin-bottom: 22px;
      animation: fadeUp 0.8s 0.85s both;
    }
    .message-box p {
      font-size: 15.5px;
      line-height: 1.9;
      color: #4a2840;
      font-weight: 300;
    }
    .message-box .italic-line {
      font-family: 'Cormorant Garamond', serif;
      font-style: italic;
      font-size: 17.5px;
      color: #b04888;
      display: block;
      margin: 12px 0 8px;
      border-left: 3px solid var(--pink);
      padding-left: 14px;
      line-height: 1.6;
    }

    /* Bottom sign off */
    .sign-off {
      animation: fadeUp 0.8s 1s both;
    }
    .emoji-row {
      font-size: 22px;
      letter-spacing: 8px;
      margin-bottom: 14px;
    }
    .from-label {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 2.5px;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 3px;
    }
    .from-name {
      font-family: 'DM Serif Display', serif;
      font-style: italic;
      font-size: 28px;
      color: var(--deep-pink);
    }

    @keyframes fadeUp {
      from { opacity:0; transform: translateY(18px); }
      to   { opacity:1; transform: translateY(0); }
    }
  </style>
</head>
