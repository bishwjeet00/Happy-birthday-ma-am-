<!DOCTYPE html>
<html lang="hi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Happy Birthday Sanjana Ma'am 🌸</title>
  <style>
    body {
      margin: 0;
      padding: 20px;
      min-height: 100vh;
      background: linear-gradient(135deg, #fff0f8, #f0e6ff);
      font-family: system-ui, -apple-system, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .card {
      width: 100%;
      max-width: 420px;
      background: white;
      border-radius: 28px;
      box-shadow: 0 25px 70px rgba(230, 150, 190, 0.35);
      overflow: hidden;
    }
    .top-bar {
      height: 14px;
      background: linear-gradient(90deg, #ff9ed9, #c4a0ff, #9ed9c4, #ffe6b3);
    }
    .content {
      padding: 40px 30px 50px;
      text-align: center;
    }
    .photo {
      width: 150px;
      height: 150px;
      margin: 0 auto 24px;
      border-radius: 50%;
      border: 8px solid #f8d7e8;
      overflow: hidden;
      box-shadow: 0 10px 30px rgba(200, 120, 160, 0.3);
    }
    .photo img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
    h1 {
      font-size: 32px;
      color: #5c2a4a;
      margin-bottom: 8px;
    }
    .subtitle {
      color: #c45a85;
      font-size: 22px;
      margin-bottom: 30px;
    }
    .message {
      background: #fff5f9;
      padding: 28px;
      border-radius: 20px;
      text-align: left;
      line-height: 1.85;
      font-size: 16px;
      color: #4a2f45;
      border: 1px solid #f8d7e8;
      margin-bottom: 30px;
    }
    .from {
      color: #9c6b85;
      font-size: 15px;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="top-bar"></div>
    <div class="content">
      <div class="photo">
        <img src="https://via.placeholder.com/300x300/f8d7e8/5c2a4a?text=Sanjana+Ma%27am" alt="Sanjana Ma'am">
      </div>
      
      <h1>Happy Birthday</h1>
      <div class="subtitle">Sanjana Ma'am 🌸</div>
      
      <div class="message">
        Dear Sanjana Ma'am,<br><br>
        Aapki guidance, patience aur dedication.<br><br>
        Aap sirf ek teacher nahi, balki hum sabke liye ek inspiration hain.<br><br>
        Aapka har din khushiyon, swasthya aur success se bhara ho.<br>
        Wish you a wonderful year ahead!
      </div>

      <div class="from">
        With respect &amp; gratitude<br>
        <strong>Your Student</strong>
      </div>
    </div>
  </div>
</body>
  </html>
